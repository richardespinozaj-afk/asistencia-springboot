# ── Conexion a la MISMA base de datos que usa el proyecto de servlets ──
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_asistencia?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# No dejar que Hibernate cree/modifique tablas: la BD ya existe
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto distinto al 8080 para no chocar con el proyecto de servlets
server.port=8081
